kind = "web"
previewPath = "/"
title = "DhruvMarkets"
version = "1.0.0"
id = "artifacts/dhruvmarkets"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23769

[services.development]
run = "pnpm --filter @workspace/dhruvmarkets run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dhruvmarkets", "run", "build" ]
publicDir = "artifacts/dhruvmarkets/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23769"
BASE_PATH = "/"
